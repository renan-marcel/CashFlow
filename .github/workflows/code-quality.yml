name: Code Quality & Coverage Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
    
    - name: 📦 Install dependencies
      run: |
        dotnet restore
        dotnet tool install --global dotnet-reportgenerator-globaltool
    
    - name: 🧪 Run tests with OpenCover
      run: |
        dotnet test \
          --configuration Release \
          --no-restore \
          /p:CollectCoverageMetrics=true \
          /p:CoverageFormat=cobertura \
          /p:Exclude="[xunit*]*,[*.Tests]*" \
          --results-directory ./coverage
      continue-on-error: true
    
    - name: 📊 Generate HTML coverage report
      run: |
        reportgenerator \
          -reports:"./coverage/**/coverage.cobertura.xml" \
          -targetdir:"./coverage/html" \
          -reporttypes:"Html;JsonSummary" \
          -classfilters:"-*Tests*"
      continue-on-error: true
    
    - name: 📈 Extract coverage metrics
      if: always()
      run: |
        echo "## 📊 Code Coverage Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "./coverage/summary.json" ]; then
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ./coverage/summary.json | head -30 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "### Detailed Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines Covered | Pending |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches Covered | Pending |" >> $GITHUB_STEP_SUMMARY
          echo "| Methods Covered | Pending |" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: 📤 Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report-html
        path: coverage/html
        retention-days: 90
    
    - name: 📄 Publish coverage report
      if: always()
      run: |
        echo "## 📄 Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "./coverage/html" ]; then
          echo "### 📊 HTML Report Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A detailed HTML coverage report has been generated and uploaded." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download the artifact to view the full report:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Select this workflow run" >> $GITHUB_STEP_SUMMARY
          echo "3. Download 'coverage-report-html'" >> $GITHUB_STEP_SUMMARY
          echo "4. Extract and open 'index.html' in your browser" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: 🔗 Display coverage URL
      if: always()
      run: |
        echo "## 📊 Coverage Report Links" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🌐 Report Locations" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **HTML Report**: Check Artifacts section → coverage-report-html → index.html" >> $GITHUB_STEP_SUMMARY
        echo "- **Codecov**: https://codecov.io/gh/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- **This Workflow**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

  sonarqube-analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 🔨 Setup Java for SonarQube
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 🔊 Setup SonarQube Scanner
      run: |
        dotnet tool install --global dotnet-sonarscanner
    
    - name: 📦 Restore dependencies
      run: dotnet restore
    
    - name: 🔍 Run SonarQube analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      if: env.SONAR_TOKEN != ''
      run: |
        dotnet sonarscanner begin \
          /k:"CashFlow" \
          /o:"carrefour" \
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
          /d:sonar.login="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"
        
        dotnet build --no-restore --configuration Release
        dotnet test --no-build --configuration Release
        
        dotnet sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
      continue-on-error: true
    
    - name: ℹ️ SonarQube Note
      if: success()
      run: |
        echo "## 🔍 SonarQube Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Note**: SonarQube analysis requires:" >> $GITHUB_STEP_SUMMARY
        echo "1. `SONAR_TOKEN` secret configured in GitHub" >> $GITHUB_STEP_SUMMARY
        echo "2. `SONAR_HOST_URL` secret configured in GitHub" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "To enable SonarQube:" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to Settings → Secrets and variables → Actions" >> $GITHUB_STEP_SUMMARY
        echo "2. Add `SONAR_TOKEN` and `SONAR_HOST_URL`" >> $GITHUB_STEP_SUMMARY
